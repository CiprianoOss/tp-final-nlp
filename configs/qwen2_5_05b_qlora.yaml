model:
  name_or_path: Qwen/Qwen2.5-0.5B-Instruct
  trust_remote_code: false

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_file: data/processed/train.jsonl
  validation_file: data/processed/validation.jsonl
  max_seq_length: 1024

training:
  output_dir: outputs/qwen2.5-0.5b-fireball-qlora
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.0002
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  optim: paged_adamw_8bit
  logging_steps: 10
  eval_steps: 200
  save_steps: 200
  save_total_limit: 3
  max_grad_norm: 1.0
  gradient_checkpointing: true
  seed: 42
  report_to: none

